# 生图注册机 配置文件
# 复制为 config.yaml 并填入真实信息

proxy:
  url: 'http://127.0.0.1:7897'           # 代理地址 (http/socks5)
  flaresolverr_url: ''                     # FlareSolverr 地址 (可选)

registration:
  threads: 2                               # 并发线程数
  total: 10                                # 单次注册数量

mail:
  providers:
  - type: outlook_token
    enable: true
    label: Outlook Pool
    mode: graph
    imap_host: outlook.office365.com
    message_limit: 10
    mailboxes: |
      # 格式: email----password----client_id----refresh_token (一行一个)
      user1@outlook.com----password1----client_id_1----refresh_token_1
      user2@outlook.com----password2----client_id_2----refresh_token_2
  request_timeout: 30
  wait_timeout: 45
  wait_interval: 3

output_file: access_tokens.txt
